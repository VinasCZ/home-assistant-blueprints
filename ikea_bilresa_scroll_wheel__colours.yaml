blueprint:
  name: "IKEA Bilresa Scroll Wheel - brightness / colour / white balance"
  description: "Control a light using the IKEA Bilresa scroll wheel. Different modes control brightness / colour / white balance of a single light/light group."
  domain: automation
  input:
    brightness_scroll_right_entity:
      name: "Brightness: Scroll Right Entity"
      selector:
        entity:
          domain: event

    brightness_scroll_left_entity:
      name: "Brightness: Scroll Left Entity"
      selector:
        entity:
          domain: event

    temperature_scroll_right_entity:
      name: "Temperature: Scroll Right Entity"
      selector:
        entity:
          domain: event

    temperature_scroll_left_entity:
      name: "Temperature: Scroll Left Entity"
      selector:
        entity:
          domain: event

    brightness_button_press_entity:
      name: "Brightness: Button Press Entity"
      description: "The event entity for button press actions (toggles light)"
      selector:
        entity:
          domain: event

    temperature_button_press_entity:
      name: "Temperature: Button Press Entity"
      description: "The event entity for button press actions (toggles light)"
      selector:
        entity:
          domain: event

    light_target:
      name: "Target Light"
      description: "The light to control"
      selector:
        entity:
          domain: light

    brightness_increase_step:
      name: "Brightness: Increase Step"
      default: 10
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"

    brightness_decrease_step:
      name: "Brightness: Decrease Step"
      default: 10
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"

    temperature_increase_step:
      name: "Temperature: Increase Step"
      description: "How much to increase white balance (percentage)"
      default: 10
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"

    temperature_decrease_step:
      name: "Temperature: Decrease Step"
      description: "How much to decrease white balance (percentage)"
      default: 10
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"

    brightness_scroll_right_action:
      name: "Brightness: Scroll Right Action"
      default: "increase"
      selector:
        select:
          options:
            - label: "Increase Brightness"
              value: "increase"
            - label: "Decrease Brightness"
              value: "decrease"

    temperature_scroll_right_action:
      name: "Temperature: Scroll Right Action"
      description: "What happens when scrolling right for white balance"
      default: "increase"
      selector:
        select:
          options:
            - label: "Increase white balance"
              value: "increase"
            - label: "Decrease white balance"
              value: "decrease"

    brightness_min:
      name: "Brightness: Minimum"
      description: "Minimum brightness to prevent lights from turning off (percentage)"
      default: 5
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"

    brightness_max:
      name: "Brightness: Maximum"
      description: "Maximum brightness (percentage)"
      default: 100
      selector:
        number:
          min: 50
          max: 100
          unit_of_measurement: "%"

    temperature_min:
      name: "Temperature: Minimum"
      description: "Minimum white balance"
      default: 0
      selector:
        number:
          min: 0
          max: 10000
          unit_of_measurement: "K"

    temperature_max:
      name: "Temperature: Maximum"
      description: "Maximum white balance"
      default: 10000
      selector:
        number:
          min: 0
          max: 10000
          unit_of_measurement: "K"

    # Smoothing settings
    transition_time:
      name: "Transition Time"
      description: "How long the light takes to transition between values (seconds). Lower = more responsive, higher = smoother."
      default: 0.2
      selector:
        number:
          min: 0
          max: 2
          step: 0.1
          unit_of_measurement: "s"

    # Common settings
    automation_mode:
      name: "Automation Mode"
      description: "How to handle multiple triggers"
      default: "restart"
      selector:
        select:
          options:
            - label: "Restart (recommended - interrupts previous action for instant response)"
              value: "restart"
            - label: "Queued (queue all scroll actions - can feel laggy)"
              value: "queued"
            - label: "Single (ignore new triggers while running)"
              value: "single"
            - label: "Parallel (run multiple instances simultaneously)"
              value: "parallel"

    max_queue:
      name: "Maximum Queue Size"
      description: "Maximum number of queued scroll actions (only applies in queued mode)"
      default: 20
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "actions"

trigger:
  - platform: state
    entity_id: !input brightness_scroll_right_entity
    id: brightness_scroll_right
  - platform: state
    entity_id: !input brightness_scroll_left_entity
    id: brightness_scroll_left
  - platform: state
    entity_id: !input brightness_button_press_entity
    id: brightness_button_press
  - platform: state
    entity_id: !input temperature_scroll_right_entity
    id: temperature_scroll_right
  - platform: state
    entity_id: !input temperature_scroll_left_entity
    id: temperature_scroll_left
  - platform: state
    entity_id: !input temperature_button_press_entity
    id: temperature_button_press


action:
  - variables:
      target_light: !input light_target

      brightness_increase_step: !input brightness_increase_step
      brightness_decrease_step: !input brightness_decrease_step
      brightness_scroll_direction: !input brightness_scroll_right_action
      brightness_min: !input brightness_min
      brightness_max: !input brightness_max

      temperature_increase_step: !input temperature_increase_step
      temperature_decrease_step: !input temperature_decrease_step
      temperature_scroll_direction: !input temperature_scroll_right_action
      temperature_min: !input temperature_min
      temperature_max: !input temperature_max

      # Smoothing
      transition: !input transition_time
      # Multiplier from scroll speed (multi_press count)
      press_count: "{{ trigger.to_state.attributes.totalNumberOfPressesCounted | int(1) }}"

  - choose:
      # Toggle lights via button press
      - conditions:
          - condition: trigger
            id: brightness_button_press
        sequence:
          - service: light.toggle
            target:
              entity_id: "{{ target_light }}"

      # Scroll right actions
      - conditions:
          - condition: trigger
            id: brightness_scroll_right
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              transition: "{{ transition }}"
              brightness_pct: >-
                {% set current = state_attr(target_light, 'brightness') %}
                {% if current is none %}
                  {% set current_pct = 50 %}
                {% else %}
                  {% set current_pct = (current / 255 * 100) | round(0) %}
                {% endif %}
                {% if brightness_scroll_direction == 'increase' %}
                  {% set new_pct = current_pct + (brightness_increase_step * press_count) %}
                {% else %}
                  {% set new_pct = current_pct - (brightness_decrease_step * press_count) %}
                {% endif %}
                {{ [[new_pct, brightness_min] | max, brightness_max] | min }}

      - conditions:
          - condition: trigger
            id: brightness_scroll_left
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              transition: "{{ transition }}"
              brightness_pct: >-
                {% set current = state_attr(target_light, 'brightness') %}
                {% if current is none %}
                  {% set current_pct = 50 %}
                {% else %}
                  {% set current_pct = (current / 255 * 100) | round(0) %}
                {% endif %}
                {% if light_1_scroll_direction == 'increase' %}
                  {% set new_pct = current_pct - (brightness_decrease_step * press_count) %}
                {% else %}
                  {% set new_pct = current_pct + (brightness_increase_step * press_count) %}
                {% endif %}
                
                {{ [[new_pct, brightness_min] | max, brightness_max] | min }}

      - conditions:
          - condition: trigger
            id: temperature_scroll_right
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              transition: "{{ transition }}"
              color_temp_kelvin: >-
                {% set current_temp = state_attr(target_light, 'color_temp_kelvin') %}
                
                {% if current is none %}
                  {% set current_temp = temperature_min %}
                {% endif %}
                
                {% if temperature_scroll_direction == 'increase' %}
                  {% set new_temp = current_temp + (temperature_increase_step * press_count) %}
                {% else %}
                  {% set new_temp = current_temp - (temperature_decrease_step * press_count) %}
                {% endif %}
                {{ [[new_pct, temperature_min] | max, temperature_max] | min }}

      - conditions:
          - condition: trigger
            id: temperature_scroll_left
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              transition: "{{ transition }}"
              color_temp_kelvin: >-
                {% set current_temp = state_attr(target_light, 'color_temp_kelvin') %}
                
                {% if current is none %}
                  {% set current_temp = temperature_min %}
                {% endif %}
                
                {% if temperature_scroll_direction == 'increase' %}
                  {% set new_temp = current_temp - (temperature_increase_step * press_count) %}
                {% else %}
                  {% set new_temp = current_temp + (temperature_decrease_step * press_count) %}
                {% endif %}
                {{ [[new_pct, temperature_min] | max, temperature_max] | min }}


mode: !input automation_mode
max: !input max_queue
